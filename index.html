<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experimento IHC - Inversão de Posição</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #interface {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .btn-exp {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            width: 280px;
            height: 100px;
            border-radius: 12px;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-exp:active { transform: scale(0.95); }

        .btn-title { font-size: 20px; font-weight: bold; text-transform: uppercase; }
        .btn-subtitle { font-size: 14px; opacity: 0.9; margin-top: 4px; }

        /* --- POSICIONAMENTO INVERTIDO --- */

        /* Botão A: Azul (Teste 1) - AGORA EM CIMA */
        #btnA {
            position: absolute;
            right: 50px;
            top: 25%; 
            background-color: #007bff;
        }

        /* Botão B: Vermelho (Teste 2) - AGORA EMBAIXO */
        #btnB {
            position: absolute;
            right: 50px;
            top: 65%; 
            background-color: #dc3545;
        }

        #sucesso {
            display: none;
            text-align: center;
        }
        .check { font-size: 70px; color: #28a745; }
    </style>
</head>
<body>

    <div id="interface">
        <button id="btnA" class="btn-exp" onclick="enviar('A')">
            <span class="btn-title">Finalizar Compra</span>
            <span class="btn-subtitle">Teste 1</span>
        </button>

        <button id="btnB" class="btn-exp" onclick="enviar('B')">
            <span class="btn-title">Finalizar Compra</span>
            <span class="btn-subtitle">Teste 2</span>
        </button>
    </div>

    <div id="sucesso">
        <div class="check">✓</div>
        <h2>Escolha Registrada!</h2>
        <p>Obrigado por participar do experimento.</p>
    </div>

    <script>
        function enviar(escolha) {
            const FORM_ID = "1FAIpQLSeA-8h7IE_wl4i1lrtlKHdD1Xcj_0mx3IbfDDGjZ3nHhFmmiQ";
            const ENTRY_ID = "1295212732";
            
            const url = `https://docs.google.com/forms/d/e/${FORM_ID}/formResponse?entry.${ENTRY_ID}=${escolha}&submit=Submit`;

            fetch(url, { mode: 'no-cors' }).then(() => {
                document.getElementById('interface').style.display = 'none';
                document.getElementById('sucesso').style.display = 'block';
            });
        }
    </script>
</body>
</html>
