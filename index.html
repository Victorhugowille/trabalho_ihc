<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Experimento IHC</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #f8f9fa;
        font-family: Arial, sans-serif;
    }

    #interface {
        display: flex;
        gap: 40px;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        width: 100%;
        padding: 20px;
    }

    .btn-exp {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        border: none;
        cursor: pointer;
        transition: 0.2s;
        text-align: center;

        width: 90%;
        max-width: 280px;
        height: 100px;

        border-radius: 12px;
        color: white;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .btn-exp:active {
        transform: scale(0.95);
    }

    .btn-title {
        font-size: 18px;
        font-weight: bold;
    }

    .btn-subtitle {
        font-size: 14px;
        opacity: 0.9;
    }

    .azul { background-color: #007bff; }
    .vermelho { background-color: #dc3545; }

    #sucesso {
        display: none;
        text-align: center;
    }

    .check {
        font-size: 60px;
        color: #28a745;
    }
</style>
</head>

<body>

<div id="interface"></div>

<div id="sucesso">
    <div class="check">✓</div>
    <h2>Escolha Registrada!</h2>
    <p>Obrigado por participar.</p>
</div>

<script>
    const inicio = Date.now();

    const FORM_ID = "1FAIpQLSeA-8h7IE_wl4i1lrtlKHdD1Xcj_0mx3IbfDDGjZ3nHhFmmiQ";
    const ENTRY_ESCOLHA = "1295212732";
    const ENTRY_TEMPO = "1234567890"; // coloque o ID real do campo tempo

    const opcoes = [
        { id: "A", classe: "azul", subtitulo: "Teste 1" },
        { id: "B", classe: "vermelho", subtitulo: "Teste 2" }
    ];

    // 🔀 Randomiza ordem (importante para experimento)
    opcoes.sort(() => Math.random() - 0.5);

    const container = document.getElementById("interface");

    opcoes.forEach(op => {
        const btn = document.createElement("button");
        btn.className = `btn-exp ${op.classe}`;

        btn.innerHTML = `
            <span class="btn-title">Finalizar Compra</span>
            <span class="btn-subtitle">${op.subtitulo}</span>
        `;

        btn.onclick = () => enviar(op.id);

        container.appendChild(btn);
    });

    function enviar(escolha) {
        const tempo = Date.now() - inicio;

        const url = `https://docs.google.com/forms/d/e/${FORM_ID}/formResponse?entry.${ENTRY_ESCOLHA}=${escolha}&entry.${ENTRY_TEMPO}=${tempo}&submit=Submit`;

        fetch(url, { mode: 'no-cors' }).then(() => {
            document.getElementById('interface').style.display = 'none';
            document.getElementById('sucesso').style.display = 'block';
        });
    }
</script>

</body>
</html>
